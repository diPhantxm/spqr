name: Run benchmarks

on:
  pull_request:
    types: [labeled]
  repository_dispatch:
    types: [benchmark-command]

  workflow_dispatch:
    inputs:
      cpu:
        description: 'Number of CPU cores on router'     
        required: false
        default: 32
      memory:
        description: 'RAM in GB'
        required: false
        default: 32
      shards_count:
        description: 'Amount of shards'
        required: false
        default: 4
      shard_resource_preset:
        description: "Shard's Resource Preset"
        required: false
        default: 's3-c8-m32'

jobs:
  build:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'performance' ||
      github.event.name == 'repository_dispatch'

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.client_payload.pull_request.head.ref }}
          repository: ${{ github.event.client_payload.pull_request.head.repo.full_name }}

      - name: Yandex Cloud CR "Login" Action for GitHub Actions
        uses: yc-actions/yc-cr-login@v3
        with:
          yc-sa-json-credentials: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          cr-endpoint: cr.yandex

      - name: Build, tag, and push image to Yandex Cloud Container Registry
        env:
          CR_REGISTRY: ${{ secrets.YC_REGISTRY_ID }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t spqr-base-image -f docker/spqr/Dockerfile .
          docker build -t cr.yandex/$CR_REGISTRY/spqr:$IMAGE_TAG -f docker/router/Dockerfile .
          docker push cr.yandex/$CR_REGISTRY/spqr:$IMAGE_TAG

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.1.9

      - name: Prepare Infra
        env:
          CR_REGISTRY: ${{ secrets.YC_REGISTRY_ID }}
          IMAGE_TAG: ${{ github.sha }}
          YC_SERVICE_ACCOUNT_KEY_FILE: ${{ secrets.YC_SA_JSON_CREDENTIALS }}
          TF_VAR_cr_registry: ${{ secrets.YC_REGISTRY_ID }}
          TF_VAR_image_tag: ${{ github.sha }}
          TF_VAR_image_id: cr.yandex/$CR_REGISTRY/spqr:$IMAGE_TAG
          TF_VAR_pr_number: ${{ github.event.pull_request.head.ref || github.event.client_payload.pull_request.head.ref }}
          TF_VAR_router_cpu: ${{ inputs.cpu }}
          TF_VAR_router_mem: ${{ inputs.memory }}
          TF_VAR_shards_count: ${{ inputs.shards_count }}
          TF_VAR_shard_resource_preset: ${{ inputs.shard_resource_preset }}
          AWS_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_KEY }}
        run: |
          terraform -chdir=.github/actions/benchmarks init -backend-config="key=$TF_VAR_pr_number/terraform.tfstate"
          terraform -chdir=.github/actions/benchmarks apply -auto-approve

      - name: Send link
        uses: peter-evans/create-or-update-comment@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            [Benchmark report](https://storage.yandexcloud.net/spqr-benchmark-reports/index.html?pr=${{ github.event.pull_request.number }})
